name: Intelligent Deployment Based on Changes

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            tag_name:
                description: "Tag name for the release"
                required: true
                default: "latest"
            force_all:
                description: "Force deployment of all services"
                required: false
                default: false
                type: boolean

permissions:
    contents: read
    packages: write

concurrency:
    group: release-${{ github.workflow }}-${{ github.event.release.tag_name || github.event.inputs.tag_name || github.run_id }}
    cancel-in-progress: false

env:
    REGISTRY: ghcr.io
    OWNER: ${{ github.repository_owner }}
    REPOSITORY: ${{ github.event.repository.name }}

jobs:
    detect-changes:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        outputs:
            deploy-apiservice: ${{ steps.changes.outputs.deploy-apiservice }}
            deploy-webfrontend: ${{ steps.changes.outputs.deploy-webfrontend }}
            deploy-migrationservice: ${{ steps.changes.outputs.deploy-migrationservice }}
            primary-tag: ${{ steps.determine-tag.outputs.primary-tag }}
            apiservice-version: ${{ steps.versions.outputs.apiservice-version }}
            webfrontend-version: ${{ steps.versions.outputs.webfrontend-version }}
            migrationservice-version: ${{ steps.versions.outputs.migrationservice-version }}

        steps:
            - name: Determine release tag
              id: determine-tag
              run: |
                  if [[ "${{ github.event_name }}" == "release" ]]; then
                    echo "primary-tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "primary-tag=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Checkout repository
              uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
              with:
                  fetch-depth: 0

            - name: Resolve previous tag
              id: previous-tag
              run: |
                  if [[ "${{ github.event_name }}" == "release" ]]; then
                    current_tag="${{ github.event.release.tag_name }}"
                    previous_tag=$(git tag -l --sort=-version:refname | grep -A1 "^${current_tag}$" | tail -n1)
                  else
                    previous_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                  fi

                  if [[ -z "$previous_tag" ]]; then
                    echo "previous-tag=" >> "$GITHUB_OUTPUT"
                  else
                    echo "previous-tag=$previous_tag" >> "$GITHUB_OUTPUT"
                  fi

            - name: Detect service changes
              id: changes
              run: |
                  previous_tag="${{ steps.previous-tag.outputs.previous-tag }}"
                  force_all="${{ github.event.inputs.force_all }}"

                  deploy_apiservice="true"
                  deploy_webfrontend="true"
                  deploy_migrationservice="true"

                  if [[ -n "$previous_tag" && "$force_all" != "true" ]]; then
                    changed_files=$(git diff --name-only ${previous_tag}..HEAD)

                    deploy_apiservice="false"
                    deploy_webfrontend="false"
                    deploy_migrationservice="false"

                    if echo "$changed_files" | grep -E "(dashy3\.ApiService/|dashy3\.ServiceDefaults/|Directory\.Build\.props|\.github/workflows/)" >/dev/null; then
                      deploy_apiservice="true"
                    fi

                    if echo "$changed_files" | grep -E "(dashy3\.Web/|dashy3\.ServiceDefaults/|Directory\.Build\.props|\.github/workflows/)" >/dev/null; then
                      deploy_webfrontend="true"
                    fi

                    if echo "$changed_files" | grep -E "(dashy3\.MigrationService/|dashy3\.ApiService/|dashy3\.ServiceDefaults/|Directory\.Build\.props|\.github/workflows/)" >/dev/null; then
                      deploy_migrationservice="true"
                    fi
                  fi

                  echo "deploy-apiservice=$deploy_apiservice" >> "$GITHUB_OUTPUT"
                  echo "deploy-webfrontend=$deploy_webfrontend" >> "$GITHUB_OUTPUT"
                  echo "deploy-migrationservice=$deploy_migrationservice" >> "$GITHUB_OUTPUT"

            - name: Generate service versions
              id: versions
              run: |
                  primary_tag="${{ steps.determine-tag.outputs.primary-tag }}"

                  if [[ "${{ steps.changes.outputs.deploy-apiservice }}" == "true" ]]; then
                    apiservice_version="$primary_tag"
                  else
                    apiservice_version="$primary_tag-nochange"
                  fi

                  if [[ "${{ steps.changes.outputs.deploy-webfrontend }}" == "true" ]]; then
                    webfrontend_version="$primary_tag"
                  else
                    webfrontend_version="$primary_tag-nochange"
                  fi

                  if [[ "${{ steps.changes.outputs.deploy-migrationservice }}" == "true" ]]; then
                    migrationservice_version="$primary_tag"
                  else
                    migrationservice_version="$primary_tag-nochange"
                  fi

                  echo "apiservice-version=$apiservice_version" >> "$GITHUB_OUTPUT"
                  echo "webfrontend-version=$webfrontend_version" >> "$GITHUB_OUTPUT"
                  echo "migrationservice-version=$migrationservice_version" >> "$GITHUB_OUTPUT"

    build-apiservice:
        runs-on: ubuntu-latest
        timeout-minutes: 25
        needs: detect-changes
        if: needs.detect-changes.outputs.deploy-apiservice == 'true'

        steps:
            - name: Checkout repository
              uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push ApiService image
              uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
              with:
                  context: .
                  file: ./dashy3.ApiService/Dockerfile
                  platforms: linux/amd64
                  push: true
                  provenance: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      GITHUB_REF_NAME=${{ needs.detect-changes.outputs.apiservice-version }}
                      GITHUB_REF_TYPE=tag
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPOSITORY }}/apiservice:${{ needs.detect-changes.outputs.apiservice-version }}
                      ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPOSITORY }}/apiservice:${{ github.sha }}
                      ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPOSITORY }}/apiservice:latest

    build-webfrontend:
        runs-on: ubuntu-latest
        timeout-minutes: 25
        needs: detect-changes
        if: needs.detect-changes.outputs.deploy-webfrontend == 'true'

        steps:
            - name: Checkout repository
              uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push WebFrontend image
              uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
              with:
                  context: .
                  file: ./dashy3.Web/Dockerfile
                  platforms: linux/amd64
                  push: true
                  provenance: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      GITHUB_REF_NAME=${{ needs.detect-changes.outputs.webfrontend-version }}
                      GITHUB_REF_TYPE=tag
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPOSITORY }}/webfrontend:${{ needs.detect-changes.outputs.webfrontend-version }}
                      ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPOSITORY }}/webfrontend:${{ github.sha }}
                      ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPOSITORY }}/webfrontend:latest

    build-migrationservice:
        runs-on: ubuntu-latest
        timeout-minutes: 25
        needs: detect-changes
        if: needs.detect-changes.outputs.deploy-migrationservice == 'true'

        steps:
            - name: Checkout repository
              uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push MigrationService image
              uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
              with:
                  context: .
                  file: ./dashy3.MigrationService/Dockerfile
                  platforms: linux/amd64
                  push: true
                  provenance: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      GITHUB_REF_NAME=${{ needs.detect-changes.outputs.migrationservice-version }}
                      GITHUB_REF_TYPE=tag
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPOSITORY }}/migrationservice:${{ needs.detect-changes.outputs.migrationservice-version }}
                      ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPOSITORY }}/migrationservice:${{ github.sha }}
                      ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPOSITORY }}/migrationservice:latest

    deployment-summary:
        runs-on: ubuntu-latest
        needs:
            [
                detect-changes,
                build-apiservice,
                build-webfrontend,
                build-migrationservice,
            ]
        if: always()

        steps:
            - name: Generate deployment summary
              run: |
                  echo "# Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "Release tag: ${{ needs.detect-changes.outputs.primary-tag }}" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "## Services" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"

                  if [[ "${{ needs.detect-changes.outputs.deploy-apiservice }}" == "true" ]]; then
                    echo "- ApiService: ${{ needs.build-apiservice.result }}" >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "- ApiService: skipped (no changes)" >> "$GITHUB_STEP_SUMMARY"
                  fi

                  if [[ "${{ needs.detect-changes.outputs.deploy-webfrontend }}" == "true" ]]; then
                    echo "- WebFrontend: ${{ needs.build-webfrontend.result }}" >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "- WebFrontend: skipped (no changes)" >> "$GITHUB_STEP_SUMMARY"
                  fi

                  if [[ "${{ needs.detect-changes.outputs.deploy-migrationservice }}" == "true" ]]; then
                    echo "- MigrationService: ${{ needs.build-migrationservice.result }}" >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "- MigrationService: skipped (no changes)" >> "$GITHUB_STEP_SUMMARY"
                  fi

                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "Container registry: https://github.com/${{ env.OWNER }}/${{ env.REPOSITORY }}/pkgs/container" >> "$GITHUB_STEP_SUMMARY"
