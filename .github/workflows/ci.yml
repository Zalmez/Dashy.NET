name: CI Pipeline

on:
    push:
        branches: ["main"]
        paths-ignore:
            - "docs/**"
    pull_request:
        branches: ["main"]
        paths-ignore:
            - "docs/**"
    release:
        types: [published]
    schedule:
        - cron: "0 3 * * *"
    workflow_dispatch:
        inputs:
            tag_name:
                description: "Tag name for image publishing"
                required: false
                default: "latest"
            force_all:
                description: "Force publishing all services"
                required: false
                default: false
                type: boolean
            run_validation:
                description: "Run .NET build and tests"
                required: false
                default: false
                type: boolean

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    DOTNET_NOLOGO: true
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    REGISTRY: ghcr.io

jobs:
    validate-dotnet:
        if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.run_validation == true)
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
            checks: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup .NET 10 SDK
              uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.0.0
              with:
                  dotnet-version: "10.0.x"
                  cache: true
                  cache-dependency-path: |
                      **/packages.lock.json
                      **/*.csproj

            - name: Restore dependencies
              run: dotnet restore

            - name: Build Solution
              run: dotnet build --configuration Release --no-restore

            - name: trust dev certs
              run: SSL_CERT_DIR="$HOME/.aspnet/dev-certs/trust" dotnet dev-certs https --trust

            - name: Run Tests
              run: dotnet test --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=results.trx" --results-directory ./test-results

            - name: Publish Test Results
              uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2
              if: always()
              with:
                  name: Test Results
                  path: ./test-results/*.trx
                  reporter: dotnet-trx

    detect-changes:
        if: github.event_name == 'release' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_validation != true)
        runs-on: ubuntu-latest
        timeout-minutes: 10
        outputs:
            proceed: ${{ steps.proceed.outputs.proceed }}
            deploy-apiservice: ${{ steps.changes.outputs.deploy-apiservice }}
            deploy-webfrontend: ${{ steps.changes.outputs.deploy-webfrontend }}
            deploy-migrationservice: ${{ steps.changes.outputs.deploy-migrationservice }}
            primary-tag: ${{ steps.context.outputs.primary-tag }}
            apiservice-version: ${{ steps.versions.outputs.apiservice-version }}
            webfrontend-version: ${{ steps.versions.outputs.webfrontend-version }}
            migrationservice-version: ${{ steps.versions.outputs.migrationservice-version }}
            owner-lower: ${{ steps.repo.outputs.owner-lower }}
            repository-lower: ${{ steps.repo.outputs.repository-lower }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - name: Normalize repository metadata
              id: repo
              run: |
                  owner_lower=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
                  repository_lower=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
                  echo "owner-lower=$owner_lower" >> "$GITHUB_OUTPUT"
                  echo "repository-lower=$repository_lower" >> "$GITHUB_OUTPUT"

            - name: Determine runtime context
              id: context
              run: |
                  if [[ "${{ github.event_name }}" == "release" ]]; then
                    primary_tag="${{ github.event.release.tag_name }}"
                  elif [[ "${{ github.event_name }}" == "schedule" ]]; then
                    primary_tag="nightly-$(date +'%Y%m%d')"
                  else
                    primary_tag="${{ github.event.inputs.tag_name }}"
                  fi
                  echo "primary-tag=$primary_tag" >> "$GITHUB_OUTPUT"

            - name: Decide whether image publishing should proceed
              id: proceed
              run: |
                  if [[ "${{ github.event_name }}" == "schedule" ]]; then
                    latest_commit_timestamp=$(git log -1 --format=%ct)
                    one_day_ago_timestamp=$(date -d '24 hours ago' +%s)
                    if [[ "$latest_commit_timestamp" -gt "$one_day_ago_timestamp" ]]; then
                      echo "proceed=true" >> "$GITHUB_OUTPUT"
                    else
                      echo "proceed=false" >> "$GITHUB_OUTPUT"
                    fi
                  else
                    echo "proceed=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Resolve previous tag
              id: previous-tag
              run: |
                  if [[ "${{ github.event_name }}" == "release" ]]; then
                    current_tag="${{ github.event.release.tag_name }}"
                    previous_tag=$(git tag -l --sort=-version:refname | grep -A1 "^${current_tag}$" | tail -n1)
                  elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    previous_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                  else
                    previous_tag=""
                  fi

                  if [[ -z "$previous_tag" ]]; then
                    echo "previous-tag=" >> "$GITHUB_OUTPUT"
                  else
                    echo "previous-tag=$previous_tag" >> "$GITHUB_OUTPUT"
                  fi

            - name: Detect service changes
              id: changes
              run: |
                  proceed="${{ steps.proceed.outputs.proceed }}"
                  previous_tag="${{ steps.previous-tag.outputs.previous-tag }}"
                  force_all="${{ github.event.inputs.force_all }}"

                  deploy_apiservice="false"
                  deploy_webfrontend="false"
                  deploy_migrationservice="false"

                  if [[ "$proceed" != "true" ]]; then
                    echo "No new commits for nightly run; skipping image publishing."
                  elif [[ "${{ github.event_name }}" == "schedule" ]]; then
                    deploy_apiservice="true"
                    deploy_webfrontend="true"
                    deploy_migrationservice="true"
                  elif [[ -n "$previous_tag" && "$force_all" != "true" ]]; then
                    changed_files=$(git diff --name-only ${previous_tag}..HEAD)

                    if echo "$changed_files" | grep -E "(dashy3\.ApiService/|dashy3\.ServiceDefaults/|Directory\.Build\.props|\.github/workflows/)" >/dev/null; then
                      deploy_apiservice="true"
                    fi

                    if echo "$changed_files" | grep -E "(dashy3\.Web/|dashy3\.ServiceDefaults/|Directory\.Build\.props|\.github/workflows/)" >/dev/null; then
                      deploy_webfrontend="true"
                    fi

                    if echo "$changed_files" | grep -E "(dashy3\.MigrationService/|dashy3\.ApiService/|dashy3\.ServiceDefaults/|Directory\.Build\.props|\.github/workflows/)" >/dev/null; then
                      deploy_migrationservice="true"
                    fi
                  else
                    deploy_apiservice="true"
                    deploy_webfrontend="true"
                    deploy_migrationservice="true"
                  fi

                  echo "deploy-apiservice=$deploy_apiservice" >> "$GITHUB_OUTPUT"
                  echo "deploy-webfrontend=$deploy_webfrontend" >> "$GITHUB_OUTPUT"
                  echo "deploy-migrationservice=$deploy_migrationservice" >> "$GITHUB_OUTPUT"

            - name: Generate service versions
              id: versions
              run: |
                  primary_tag="${{ steps.context.outputs.primary-tag }}"

                  if [[ "${{ steps.changes.outputs.deploy-apiservice }}" == "true" ]]; then
                    apiservice_version="$primary_tag"
                  else
                    apiservice_version="$primary_tag-nochange"
                  fi

                  if [[ "${{ steps.changes.outputs.deploy-webfrontend }}" == "true" ]]; then
                    webfrontend_version="$primary_tag"
                  else
                    webfrontend_version="$primary_tag-nochange"
                  fi

                  if [[ "${{ steps.changes.outputs.deploy-migrationservice }}" == "true" ]]; then
                    migrationservice_version="$primary_tag"
                  else
                    migrationservice_version="$primary_tag-nochange"
                  fi

                  echo "apiservice-version=$apiservice_version" >> "$GITHUB_OUTPUT"
                  echo "webfrontend-version=$webfrontend_version" >> "$GITHUB_OUTPUT"
                  echo "migrationservice-version=$migrationservice_version" >> "$GITHUB_OUTPUT"

    build-apiservice:
        runs-on: ubuntu-latest
        timeout-minutes: 25
        needs: detect-changes
        if: needs.detect-changes.outputs.proceed == 'true' && needs.detect-changes.outputs.deploy-apiservice == 'true'
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.4.0
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push ApiService image
              uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
              with:
                  context: .
                  file: ./dashy3.ApiService/Dockerfile
                  platforms: linux/amd64
                  push: true
                  provenance: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      GITHUB_REF_NAME=${{ needs.detect-changes.outputs.apiservice-version }}
                      GITHUB_REF_TYPE=tag
                  tags: |
                      ${{ env.REGISTRY }}/${{ needs.detect-changes.outputs.owner-lower }}/${{ needs.detect-changes.outputs.repository-lower }}/apiservice:${{ needs.detect-changes.outputs.apiservice-version }}
                      ${{ env.REGISTRY }}/${{ needs.detect-changes.outputs.owner-lower }}/${{ needs.detect-changes.outputs.repository-lower }}/apiservice:${{ github.sha }}
                      ${{ env.REGISTRY }}/${{ needs.detect-changes.outputs.owner-lower }}/${{ needs.detect-changes.outputs.repository-lower }}/apiservice:latest

    build-webfrontend:
        runs-on: ubuntu-latest
        timeout-minutes: 25
        needs: detect-changes
        if: needs.detect-changes.outputs.proceed == 'true' && needs.detect-changes.outputs.deploy-webfrontend == 'true'
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.4.0
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push WebFrontend image
              uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
              with:
                  context: .
                  file: ./dashy3.Web/Dockerfile
                  platforms: linux/amd64
                  push: true
                  provenance: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      GITHUB_REF_NAME=${{ needs.detect-changes.outputs.webfrontend-version }}
                      GITHUB_REF_TYPE=tag
                  tags: |
                      ${{ env.REGISTRY }}/${{ needs.detect-changes.outputs.owner-lower }}/${{ needs.detect-changes.outputs.repository-lower }}/webfrontend:${{ needs.detect-changes.outputs.webfrontend-version }}
                      ${{ env.REGISTRY }}/${{ needs.detect-changes.outputs.owner-lower }}/${{ needs.detect-changes.outputs.repository-lower }}/webfrontend:${{ github.sha }}
                      ${{ env.REGISTRY }}/${{ needs.detect-changes.outputs.owner-lower }}/${{ needs.detect-changes.outputs.repository-lower }}/webfrontend:latest

    build-migrationservice:
        runs-on: ubuntu-latest
        timeout-minutes: 25
        needs: detect-changes
        if: needs.detect-changes.outputs.proceed == 'true' && needs.detect-changes.outputs.deploy-migrationservice == 'true'
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.4.0
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push MigrationService image
              uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
              with:
                  context: .
                  file: ./dashy3.MigrationService/Dockerfile
                  platforms: linux/amd64
                  push: true
                  provenance: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      GITHUB_REF_NAME=${{ needs.detect-changes.outputs.migrationservice-version }}
                      GITHUB_REF_TYPE=tag
                  tags: |
                      ${{ env.REGISTRY }}/${{ needs.detect-changes.outputs.owner-lower }}/${{ needs.detect-changes.outputs.repository-lower }}/migrationservice:${{ needs.detect-changes.outputs.migrationservice-version }}
                      ${{ env.REGISTRY }}/${{ needs.detect-changes.outputs.owner-lower }}/${{ needs.detect-changes.outputs.repository-lower }}/migrationservice:${{ github.sha }}
                      ${{ env.REGISTRY }}/${{ needs.detect-changes.outputs.owner-lower }}/${{ needs.detect-changes.outputs.repository-lower }}/migrationservice:latest

    deployment-summary:
        runs-on: ubuntu-latest
        needs:
            [
                detect-changes,
                build-apiservice,
                build-webfrontend,
                build-migrationservice,
            ]
        if: always() && needs.detect-changes.result != 'skipped'
        steps:
            - name: Generate deployment summary
              run: |
                  echo "# Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "Primary tag: ${{ needs.detect-changes.outputs.primary-tag }}" >> "$GITHUB_STEP_SUMMARY"
                  echo "Proceed: ${{ needs.detect-changes.outputs.proceed }}" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "## Services" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"

                  if [[ "${{ needs.detect-changes.outputs.deploy-apiservice }}" == "true" ]]; then
                    echo "- ApiService: ${{ needs.build-apiservice.result }}" >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "- ApiService: skipped (no changes)" >> "$GITHUB_STEP_SUMMARY"
                  fi

                  if [[ "${{ needs.detect-changes.outputs.deploy-webfrontend }}" == "true" ]]; then
                    echo "- WebFrontend: ${{ needs.build-webfrontend.result }}" >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "- WebFrontend: skipped (no changes)" >> "$GITHUB_STEP_SUMMARY"
                  fi

                  if [[ "${{ needs.detect-changes.outputs.deploy-migrationservice }}" == "true" ]]; then
                    echo "- MigrationService: ${{ needs.build-migrationservice.result }}" >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "- MigrationService: skipped (no changes)" >> "$GITHUB_STEP_SUMMARY"
                  fi

                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "Container registry: https://github.com/${{ needs.detect-changes.outputs.owner-lower }}/${{ needs.detect-changes.outputs.repository-lower }}/pkgs/container" >> "$GITHUB_STEP_SUMMARY"
