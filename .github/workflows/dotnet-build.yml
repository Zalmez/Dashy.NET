name: .NET Build Verification
permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d
        with:
          dotnet-version: "10.0.x"

      # Authenticate with Docker Hub to avoid anonymous pull rate limits (100/6h per IP).
      # Aspire integration tests pull Redis, PostgreSQL, and PgAdmin images at startup.
      # Add DOCKER_USERNAME and DOCKER_PASSWORD as repository secrets to enable this.
      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Solution
        run: dotnet build --configuration Release

      - name: Run Tests
        run: dotnet test --configuration Release --no-build --verbosity normal
